name: venta_motos_app
description: Venta Motos App — Cliente móvil para el backend de venta de motos
publish_to: none
version: 1.0.0+1
environment:
  sdk: ">=3.5.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  # ── Estado ───────────────────────────────
  flutter_riverpod: ^2.5.1      # Manejo de estado global (AuthContext, datos de la API, etc.)
  riverpod_annotation: ^2.3.5   # Anotaciones para generar providers
  # ── Navegación ───────────────────────────
  go_router: ^14.2.7            # Rutas declarativas + protección de rutas privadas (redirect por rol)
  # ── HTTP ─────────────────────────────────
  dio: ^5.7.0                   # Cliente HTTP para consumir tu API (con interceptores para el token)
  # ── Almacenamiento seguro ────────────────
  flutter_secure_storage: ^9.2.2 # Guarda el token JWT de forma cifrada en el dispositivo
  # ── Imágenes ─────────────────────────────
  cached_network_image: ^3.4.1  # Muestra imágenes de motos desde una URL y las cachea (no las descarga cada vez)
  # ── Modelos / serialización ──────────────
  freezed_annotation: ^2.4.4    # Anotaciones para generar modelos inmutables (Moto, Venta, etc.)
  json_annotation: ^4.9.0       # Anotaciones para generar el fromJson/toJson de esos modelos
  # ── Configuración / entorno ──────────────
  flutter_dotenv: ^5.2.1        # Lee las variables del .env (API_BASE_URL)
  # ── Utilidades ───────────────────────────
  intl: ^0.19.0                 # Formateo de fechas y moneda (ej: precios de motos en $)
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0         # Reglas de estilo/lint para mantener el código limpio
  # ── Generadores de código ─────────────────
  build_runner: ^2.4.13         # Motor que ejecuta los generadores (freezed, json_serializable, riverpod)
  freezed: ^2.5.7                # Genera el código de los modelos anotados con @freezed
  json_serializable: ^6.8.0     # Genera el fromJson/toJson real a partir de las anotaciones

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.dev
    - assets/images/